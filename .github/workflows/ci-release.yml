# This workflow will release the packages with Changesets

name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions: {}

jobs:
  release:
    # [IMPORTANT] Prevent this action from running on forks
    if: github.repository == 'cncjs/cncjs'
    permissions:
      contents: write       # to create release (changesets/action)
      issues: write         # to post issue comments (changesets/action)
      pull-requests: write  # to create pull request (changesets/action)
      id-token: write       # to request OIDC token for npm Trusted Publishing
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          # Fetch the entire Git history to ensure `Changesets` can generate changelogs with the correct commits
          fetch-depth: 0
      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: 'https://registry.npmjs.org'
      - name: Install Dependencies
        id: install-dependencies
        run: yarn install
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
          version: yarn ci-version
          publish: yarn ci-publish
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
